syntax = "proto3";

package settings;

message AgentConfig {
  string command = 1;
  repeated string args = 2;
  map<string, string> env = 3;
}

message AgentsConfig {
  map<string, AgentConfig> agents = 1;
}

message MCPServer {
  string name = 1;
  string url = 2;
  string type = 3;
  bool enabled = 4;
}

message MCPConfig {
  bool enabled = 1;
  bool auto_connect = 2;
  int32 retry_attempts = 3;
  int32 retry_delay = 4;
  int32 request_timeout = 5;
  repeated MCPServer servers = 6;
  bool debug = 7;
}

message Settings {
  string version = 1;
  AgentsConfig agents_config = 2;
  MCPConfig mcp_config = 3;
}
